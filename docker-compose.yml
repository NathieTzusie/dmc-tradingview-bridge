#
# 快速启动：
#   cp .env.example .env
#   # 编辑 .env 填入你的 API key
#   docker compose up -d
#   open http://localhost:8080/dashboard
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  bridge:
    build: .
    container_name: dmc-tradingview-bridge
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
